<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Mind UTM Builder & Traffic Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="root">
        <div class="min-h-screen bg-[#F9F8F4] p-4 flex items-center justify-center">
            <div class="text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500 mx-auto mb-4"></div>
                <p class="text-stone-500">Loading Heart Mind UTM Builder...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Supabase configuration
        const SUPABASE_URL = 'https://hzacrecdazrbgunafxyk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6YWNyZWNkYXpyYmd1bmFmeHlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgyNzYyOTMsImV4cCI6MjA2Mzg1MjI5M30.NULWmPxHRw86FldSuMgv3otvQZUVa7wWQgj0nwa8kpk';

        // Icons
        const Plus = ({ className = "w-4 h-4" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
            </svg>
        );

        const Copy = ({ className = "w-4 h-4" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
        );

        const Trash2 = ({ className = "w-4 h-4" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        );

        const Settings = ({ className = "w-4 h-4" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        );

        const MeditationLogo = ({ className = "w-6 h-6" }) => (
            <svg className={className} viewBox="0 0 100 100" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="50" cy="13" rx="11" ry="12"/>
                <path d="M50,64 C46,55 36,44 30,32 C37,24 52,28 56,42 C55,52 53,59 50,64Z"/>
                <path d="M50,64 C54,55 64,44 70,32 C63,24 48,28 44,42 C45,52 47,59 50,64Z"/>
                <path d="M10,46 C5,58 7,72 17,76 C21,68 23,57 20,45 C16,42 12,43 10,46Z"/>
                <path d="M90,46 C95,58 93,72 83,76 C79,68 77,57 80,45 C84,42 88,43 90,46Z"/>
                <path d="M6,92 C6,79 22,73 50,77 L50,90 C34,87 18,87 6,92Z"/>
                <path d="M94,92 C94,79 78,73 50,77 L50,90 C66,87 82,87 94,92Z"/>
            </svg>
        );

        function UTMBuilder() {
          const [settings, setSettings] = useState({
            sources: ['kartra', 'kajabi', 'email', 'facebook', 'instagram'],
            mediums: ['email', 'social', 'webinar', 'partner'],
            campaigns: ['newsletter', 'workshop', 'product-launch', 'webinar-series']
          });

          const [activeTab, setActiveTab] = useState('Email');
          const [campaigns, setCampaigns] = useState({
            'Email': [],
            'Custom': []
          });

          const [isLoading, setIsLoading] = useState(false);
          const [isSaving, setIsSaving] = useState(false);
          const [lastSaved, setLastSaved] = useState(null);
          const [showSettings, setShowSettings] = useState(false);
          const [connectionStatus, setConnectionStatus] = useState('checking');
          const [connectionMessage, setConnectionMessage] = useState('Checking connection...');
          const [toast, setToast] = useState(null);
          const [isSavingSettings, setIsSavingSettings] = useState(false);
          const [settingsError, setSettingsError] = useState(null);

          useEffect(() => {
            testConnection();
          }, []);

          const showToast = (message, type = 'success') => {
            setToast({ message, type });
            setTimeout(() => setToast(null), 3000);
          };

          const testConnection = async () => {
            try {
              setConnectionStatus('checking');
              setConnectionMessage('Connecting...');

              const response = await fetch(`${SUPABASE_URL}/rest/v1/`, {
                headers: {
                  'apikey': SUPABASE_ANON_KEY,
                  'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                }
              });

              if (response.ok) {
                setConnectionStatus('connected');
                setConnectionMessage('Connected');
                loadData();
              } else {
                setConnectionStatus('error');
                setConnectionMessage(`Connection failed: ${response.status}`);
                setIsLoading(false);
              }
            } catch (error) {
              console.error('Connection error:', error);
              setConnectionStatus('error');
              setConnectionMessage(`Connection error: ${error.message}`);
              setIsLoading(false);
            }
          };

          const loadData = async () => {
            try {
              setIsLoading(true);
              setConnectionMessage('Loading campaigns...');

              let campaignsData = [];
              try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/campaigns?select=*`, {
                  headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                  }
                });

                if (response.ok) {
                  campaignsData = await response.json();
                }
              } catch (error) {
                // Campaigns table may not exist yet
              }

              const campaignsByTab = { 'Email': [], 'Custom': [] };

              campaignsData.forEach(campaign => {
                if (campaignsByTab[campaign.tab]) {
                  campaignsByTab[campaign.tab].push({
                    id: campaign.id,
                    url: campaign.url || '',
                    source: campaign.source || '',
                    medium: campaign.medium || '',
                    campaign: campaign.campaign || '',
                    term: campaign.term || '',
                    hmiAffiliate: campaign.hmi_affiliate || false,
                    notes: campaign.notes || ''
                  });
                }
              });

              setCampaigns(campaignsByTab);

              setConnectionMessage('Loading settings...');
              let settingsData = [];
              try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/settings?select=*`, {
                  headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                  }
                });

                if (response.ok) {
                  settingsData = await response.json();

                  const settingsByType = { sources: [], mediums: [], campaigns: [] };

                  settingsData.forEach(setting => {
                    if (setting.type === 'source') settingsByType.sources.push(setting.value);
                    if (setting.type === 'medium') settingsByType.mediums.push(setting.value);
                    if (setting.type === 'campaign') settingsByType.campaigns.push(setting.value);
                  });

                  if (settingsByType.sources.length > 0 || settingsByType.mediums.length > 0 || settingsByType.campaigns.length > 0) {
                    setSettings({
                      sources: [...new Set(settingsByType.sources)].filter(s => s.trim() !== ''),
                      mediums: [...new Set(settingsByType.mediums)].filter(s => s.trim() !== ''),
                      campaigns: [...new Set(settingsByType.campaigns)].filter(s => s.trim() !== '')
                    });
                  }
                }
              } catch (error) {
                // Settings table may not exist yet
              }

              setLastSaved(new Date());
              setConnectionStatus('ready');
              setConnectionMessage('Ready');

            } catch (error) {
              console.error('Error loading data:', error);
              setConnectionStatus('error');
              setConnectionMessage(`Error: ${error.message}`);
            } finally {
              setIsLoading(false);
            }
          };

          const addCampaign = async (tab) => {
            const newCampaign = {
              id: Date.now(),
              url: '',
              source: '',
              medium: '',
              campaign: '',
              term: '',
              notes: '',
              hmiAffiliate: false
            };

            setCampaigns(prev => ({
              ...prev,
              [tab]: [...prev[tab], newCampaign]
            }));

            try {
              const savedId = await saveCampaign(newCampaign, tab);
              if (savedId !== newCampaign.id) {
                setCampaigns(prev => ({
                  ...prev,
                  [tab]: prev[tab].map(c =>
                    c.id === newCampaign.id ? { ...c, id: savedId } : c
                  )
                }));
              }
            } catch (error) {
              console.error('Failed to save new campaign:', error);
            }
          };

          const updateCampaign = (tab, id, field, value) => {
            let campaignToSave = null;
            setCampaigns(prev => {
              const updated = prev[tab].map(c =>
                c.id === id ? { ...c, [field]: value } : c
              );
              campaignToSave = updated.find(c => c.id === id);
              return { ...prev, [tab]: updated };
            });

            setTimeout(async () => {
              try {
                setIsSaving(true);
                if (campaignToSave) {
                  await saveCampaign(campaignToSave, tab);
                  setLastSaved(new Date());
                }
              } catch (error) {
                console.error('Auto-save failed:', error);
              } finally {
                setIsSaving(false);
              }
            }, 1000);
          };

          const saveCampaign = async (campaign, tab) => {
            try {
              const campaignData = {
                tab,
                url: campaign.url,
                source: campaign.source,
                medium: campaign.medium,
                campaign: campaign.campaign,
                term: campaign.term,
                hmi_affiliate: campaign.hmiAffiliate,
                notes: campaign.notes
              };

              if (campaign.id && campaign.id < 1000000000000) {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/campaigns?id=eq.${campaign.id}`, {
                  method: 'PATCH',
                  headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=representation'
                  },
                  body: JSON.stringify(campaignData)
                });

                if (!response.ok) throw new Error(`Save failed: ${response.statusText}`);
              } else {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/campaigns`, {
                  method: 'POST',
                  headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=representation'
                  },
                  body: JSON.stringify(campaignData)
                });

                if (!response.ok) throw new Error(`Save failed: ${response.statusText}`);

                const result = await response.json();
                if (result && result[0]) {
                  setCampaigns(prev => ({
                    ...prev,
                    [tab]: prev[tab].map(c =>
                      c.id === campaign.id ? { ...c, id: result[0].id } : c
                    )
                  }));
                  return result[0].id;
                }
              }

              return campaign.id;
            } catch (error) {
              console.error('Error saving campaign:', error);
              throw error;
            }
          };

          const deleteCampaign = async (tab, id) => {
            try {
              if (id < 1000000000000) {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/campaigns?id=eq.${id}`, {
                  method: 'DELETE',
                  headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                  }
                });

                if (!response.ok) throw new Error(`Delete failed: ${response.statusText}`);
              }

              setCampaigns(prev => ({
                ...prev,
                [tab]: prev[tab].filter(campaign => campaign.id !== id)
              }));

              setLastSaved(new Date());
            } catch (error) {
              console.error('Error deleting campaign:', error);
            }
          };

          const saveSettings = async (newSettings) => {
            try {
              const cleanSettings = {
                sources: [...new Set(newSettings.sources.filter(s => s && s.trim() !== ''))],
                mediums: [...new Set(newSettings.mediums.filter(s => s && s.trim() !== ''))],
                campaigns: [...new Set(newSettings.campaigns.filter(s => s && s.trim() !== ''))]
              };

              const authHeaders = {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
              };

              let backup = [];
              try {
                const backupResp = await fetch(`${SUPABASE_URL}/rest/v1/settings?select=*`, { headers: authHeaders });
                if (backupResp.ok) backup = await backupResp.json();
              } catch (e) {}

              await fetch(`${SUPABASE_URL}/rest/v1/settings?type=neq.null`, {
                method: 'DELETE',
                headers: { ...authHeaders, 'Prefer': 'return=minimal' }
              });

              const settingsArray = [];
              cleanSettings.sources.forEach(source => settingsArray.push({ type: 'source', value: source.trim() }));
              cleanSettings.mediums.forEach(medium => settingsArray.push({ type: 'medium', value: medium.trim() }));
              cleanSettings.campaigns.forEach(campaign => settingsArray.push({ type: 'campaign', value: campaign.trim() }));

              if (settingsArray.length > 0) {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/settings`, {
                  method: 'POST',
                  headers: { ...authHeaders, 'Content-Type': 'application/json' },
                  body: JSON.stringify(settingsArray)
                });

                if (!response.ok) {
                  if (backup.length > 0) {
                    const restoredBackup = backup.map(({ type, value }) => ({ type, value }));
                    await fetch(`${SUPABASE_URL}/rest/v1/settings`, {
                      method: 'POST',
                      headers: { ...authHeaders, 'Content-Type': 'application/json' },
                      body: JSON.stringify(restoredBackup)
                    });
                  }
                  throw new Error(`Settings save failed: ${response.statusText}`);
                }
              }

              setSettings(cleanSettings);

            } catch (error) {
              console.error('Error saving settings:', error);
              throw error;
            }
          };

          const generateUTMUrl = (campaign) => {
            if (!campaign.url || !campaign.source || !campaign.medium) return '';

            let baseUrl = campaign.url.trim();
            if (!baseUrl.startsWith('http://') && !baseUrl.startsWith('https://')) {
              baseUrl = 'https://' + baseUrl;
            }

            baseUrl = baseUrl.includes('?') ? baseUrl.split('?')[0] : baseUrl;

            const params = new URLSearchParams();
            if (campaign.source) params.append('utm_source', campaign.source);
            if (campaign.medium) params.append('utm_medium', campaign.medium);
            if (campaign.campaign) params.append('utm_campaign', campaign.campaign);
            if (campaign.term) params.append('utm_term', campaign.term);

            return `${baseUrl}?${params.toString()}`;
          };

          const generateFinalUrl = (campaign) => {
            const utmUrl = generateUTMUrl(campaign);
            if (!utmUrl) return '';

            let finalUrl = utmUrl;
            finalUrl += '&he={email}';
            if (campaign.campaign) {
              finalUrl += `&el=${campaign.campaign}`;
            }
            if (campaign.hmiAffiliate) {
              finalUrl += '#a_aid=hmi';
            }

            return finalUrl;
          };

          const copyToClipboard = (text) => {
            navigator.clipboard.writeText(text);
          };

          const tabs = ['Email', 'Custom'];

          const statusDotColor = connectionStatus === 'ready' || connectionStatus === 'connected'
            ? 'bg-green-400'
            : connectionStatus === 'error'
            ? 'bg-red-400'
            : 'bg-yellow-400 animate-pulse';

          return (
            <div className="min-h-screen bg-[#F9F8F4] p-4">

              {/* Toast */}
              {toast && (
                <div className={`fixed top-5 right-5 z-[100] flex items-center gap-3 px-5 py-3.5 rounded-xl shadow-lg text-sm font-medium transition-all ${
                  toast.type === 'success'
                    ? 'bg-white border border-green-200 text-green-700'
                    : 'bg-white border border-red-200 text-red-700'
                }`}>
                  <div className={`w-2 h-2 rounded-full flex-shrink-0 ${toast.type === 'success' ? 'bg-green-400' : 'bg-red-400'}`}></div>
                  {toast.message}
                </div>
              )}

              <div className="max-w-7xl mx-auto">

                {/* Header */}
                <div className="bg-white rounded-2xl shadow-sm border border-stone-200 p-6 mb-6">
                  <div className="flex justify-between items-center">
                    <div className="flex items-start gap-4">
                      <div className="w-11 h-11 rounded-xl bg-orange-50 flex items-center justify-center flex-shrink-0 mt-0.5">
                        <MeditationLogo className="w-6 h-6 text-orange-500" />
                      </div>
                      <div>
                        <h1 className="text-2xl font-extrabold text-stone-900 tracking-tight">Heart Mind UTM Builder</h1>
                        <p className="text-stone-500 text-sm mt-0.5">Build, track, and manage your marketing campaign URLs</p>
                        <div className="flex items-center gap-1.5 mt-2">
                          <div className={`w-2 h-2 rounded-full flex-shrink-0 ${statusDotColor}`}></div>
                          <span className="text-xs text-stone-400">{connectionMessage}</span>
                        </div>
                      </div>
                    </div>
                    <div className="flex items-center gap-4">
                      <div className="text-sm text-stone-400 flex items-center gap-2">
                        {isSaving ? (
                          <>
                            <div className="animate-spin rounded-full h-4 w-4 border-b-2 border-orange-500"></div>
                            <span>Saving...</span>
                          </>
                        ) : lastSaved ? (
                          <>
                            <svg className="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                            </svg>
                            <span>Saved {lastSaved.toLocaleTimeString()}</span>
                          </>
                        ) : null}
                      </div>
                      <button
                        onClick={() => setShowSettings(true)}
                        className="p-2.5 rounded-xl text-stone-400 hover:text-orange-500 hover:bg-orange-50 transition-colors"
                        title="Settings"
                      >
                        <Settings className="w-5 h-5" />
                      </button>
                    </div>
                  </div>
                </div>

                {/* Tabs + Table Card */}
                <div className="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden">
                  <div className="border-b border-stone-200">
                    <div className="flex overflow-x-auto">
                      {tabs.map(tab => (
                        <button
                          key={tab}
                          onClick={() => setActiveTab(tab)}
                          className={`px-6 py-4 text-sm font-medium whitespace-nowrap transition-colors ${
                            activeTab === tab
                              ? 'bg-orange-50 text-orange-600 border-b-2 border-orange-500'
                              : 'text-stone-500 hover:text-stone-700 hover:bg-stone-50'
                          }`}
                        >
                          {tab} <span className={`ml-1.5 text-xs px-1.5 py-0.5 rounded-full ${activeTab === tab ? 'bg-orange-100 text-orange-600' : 'bg-stone-100 text-stone-500'}`}>{campaigns[tab]?.length || 0}</span>
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* Campaign Table */}
                  <div className="p-6">
                    <div className="flex justify-between items-center mb-6">
                      <h2 className="text-lg font-semibold text-stone-900">{activeTab} Campaigns</h2>
                      <button
                        onClick={() => addCampaign(activeTab)}
                        className="bg-orange-500 hover:bg-orange-600 text-white px-5 py-2.5 rounded-full flex items-center gap-2 text-sm font-medium transition-colors shadow-sm"
                      >
                        <Plus className="w-4 h-4" />
                        Add Campaign
                      </button>
                    </div>

                    {campaigns[activeTab]?.length === 0 ? (
                      <div className="text-center py-16">
                        <div className="w-12 h-12 rounded-full bg-orange-50 flex items-center justify-center mx-auto mb-4">
                          <MeditationLogo className="w-6 h-6 text-orange-300" />
                        </div>
                        <p className="text-stone-500 font-medium">No campaigns yet</p>
                        <p className="text-stone-400 text-sm mt-1">Click "Add Campaign" to get started.</p>
                      </div>
                    ) : (
                      <div className="overflow-x-auto">
                        <table className="w-full">
                          <thead>
                            <tr className="border-b border-stone-200">
                              <th className="text-left py-2 px-2 text-xs font-semibold text-stone-500 uppercase tracking-wide min-w-[160px]">URL</th>
                              <th className="text-left py-2 px-2 text-xs font-semibold text-stone-500 uppercase tracking-wide min-w-[105px]">Source*</th>
                              <th className="text-left py-2 px-2 text-xs font-semibold text-stone-500 uppercase tracking-wide min-w-[105px]">Medium*</th>
                              <th className="text-left py-2 px-2 text-xs font-semibold text-stone-500 uppercase tracking-wide min-w-[120px]">Campaign*</th>
                              <th className="text-left py-2 px-2 text-xs font-semibold text-stone-500 uppercase tracking-wide min-w-[90px]">Term</th>
                              <th className="text-center py-2 px-2 text-xs font-semibold text-stone-500 uppercase tracking-wide">HMI?</th>
                              <th className="text-center py-2 px-2 text-xs font-semibold text-stone-500 uppercase tracking-wide">Copy URL</th>
                              <th className="text-left py-2 px-2 text-xs font-semibold text-stone-500 uppercase tracking-wide min-w-[110px]">Notes</th>
                              <th className="py-2 px-2"></th>
                            </tr>
                          </thead>
                          <tbody>
                            {campaigns[activeTab]?.map(campaign => {
                              const finalUrl = generateFinalUrl(campaign);
                              return (
                                <tr key={campaign.id} className="border-b border-stone-100 hover:bg-orange-50 transition-colors">
                                  <td className="py-2 px-2">
                                    <input
                                      type="url"
                                      value={campaign.url}
                                      onChange={(e) => updateCampaign(activeTab, campaign.id, 'url', e.target.value)}
                                      placeholder="https://example.com"
                                      className="w-full p-1.5 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500"
                                    />
                                  </td>
                                  <td className="py-2 px-2">
                                    <select
                                      value={campaign.source}
                                      onChange={(e) => updateCampaign(activeTab, campaign.id, 'source', e.target.value)}
                                      className="w-full p-1.5 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500"
                                    >
                                      <option value="">Select s</option>
                                      {settings.sources.map(source => (
                                        <option key={source} value={source}>{source}</option>
                                      ))}
                                    </select>
                                  </td>
                                  <td className="py-2 px-2">
                                    <select
                                      value={campaign.medium}
                                      onChange={(e) => updateCampaign(activeTab, campaign.id, 'medium', e.target.value)}
                                      className="w-full p-1.5 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500"
                                    >
                                      <option value="">Select m</option>
                                      {settings.mediums.map(medium => (
                                        <option key={medium} value={medium}>{medium}</option>
                                      ))}
                                    </select>
                                  </td>
                                  <td className="py-2 px-2">
                                    <select
                                      value={campaign.campaign}
                                      onChange={(e) => updateCampaign(activeTab, campaign.id, 'campaign', e.target.value)}
                                      className="w-full p-1.5 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500"
                                    >
                                      <option value="">Select c</option>
                                      {settings.campaigns.map(campaignOption => (
                                        <option key={campaignOption} value={campaignOption}>{campaignOption}</option>
                                      ))}
                                    </select>
                                  </td>
                                  <td className="py-2 px-2">
                                    <input
                                      type="text"
                                      value={campaign.term}
                                      onChange={(e) => updateCampaign(activeTab, campaign.id, 'term', e.target.value)}
                                      placeholder="keyword"
                                      className="w-full p-1.5 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500"
                                    />
                                  </td>
                                  <td className="py-2 px-2">
                                    <div className="flex justify-center">
                                      <input
                                        type="checkbox"
                                        checked={campaign.hmiAffiliate || false}
                                        onChange={(e) => updateCampaign(activeTab, campaign.id, 'hmiAffiliate', e.target.checked)}
                                        className="w-5 h-5 accent-orange-500 border-stone-300 rounded"
                                      />
                                    </div>
                                  </td>
                                  <td className="py-2 px-2 text-center">
                                    <button
                                      onClick={() => finalUrl && copyToClipboard(finalUrl)}
                                      disabled={!finalUrl}
                                      className="p-1.5 text-orange-400 hover:text-orange-600 disabled:text-stone-200 transition-colors"
                                      title={finalUrl || 'Fill required fields first'}
                                    >
                                      <Copy className="w-4 h-4" />
                                    </button>
                                  </td>
                                  <td className="py-2 px-2">
                                    <input
                                      type="text"
                                      value={campaign.notes}
                                      onChange={(e) => updateCampaign(activeTab, campaign.id, 'notes', e.target.value)}
                                      placeholder="Notes..."
                                      className="w-full p-1.5 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500"
                                    />
                                  </td>
                                  <td className="py-2 px-2">
                                    <button
                                      onClick={() => deleteCampaign(activeTab, campaign.id)}
                                      className="p-1.5 text-stone-400 hover:text-red-500 transition-colors"
                                      title="Delete Campaign"
                                    >
                                      <Trash2 className="w-4 h-4" />
                                    </button>
                                  </td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>
                </div>

                {/* Settings Modal */}
                {showSettings && (
                  <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-2xl shadow-2xl border border-stone-100 w-full max-w-4xl max-h-[85vh] flex flex-col">
                      <div className="p-6 overflow-y-auto flex-1">
                      <div className="flex items-center justify-between mb-2">
                        <h2 className="text-xl font-bold text-stone-900">Traffic Tag Settings</h2>
                        <button
                          onClick={() => setShowSettings(false)}
                          className="p-2 text-stone-400 hover:text-stone-600 hover:bg-stone-100 rounded-lg transition-colors"
                        >
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                          </svg>
                        </button>
                      </div>
                      <p className="text-stone-500 text-sm mb-6">
                        Customize the source, medium, and campaign options that appear in your dropdowns.
                      </p>
                      {settingsError && (
                        <div className="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm flex items-start gap-2">
                          <span className="font-medium">Save failed:</span>
                          <span>{settingsError}</span>
                        </div>
                      )}

                      <div className="grid md:grid-cols-3 gap-6">
                        {/* Sources */}
                        <div>
                          <h3 className="text-xs font-semibold text-stone-500 uppercase tracking-wide mb-3">Sources (brands)</h3>
                          <div className="space-y-2">
                            {settings.sources.map((source, index) => (
                              <div key={index} className="flex gap-2">
                                <input
                                  type="text"
                                  value={source}
                                  onChange={(e) => {
                                    const newSources = [...settings.sources];
                                    newSources[index] = e.target.value;
                                    setSettings(prev => ({ ...prev, sources: newSources }));
                                  }}
                                  className="flex-1 p-2 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500"
                                />
                                <button
                                  onClick={() => {
                                    const newSources = settings.sources.filter((_, i) => i !== index);
                                    setSettings(prev => ({ ...prev, sources: newSources }));
                                  }}
                                  className="p-2 text-stone-400 hover:text-red-500 transition-colors"
                                >
                                  <Trash2 className="w-4 h-4" />
                                </button>
                              </div>
                            ))}
                            <button
                              onClick={() => setSettings(prev => ({ ...prev, sources: [...prev.sources, ''] }))}
                              className="w-full p-2 border-2 border-dashed border-stone-200 rounded-lg text-stone-400 hover:border-orange-400 hover:text-orange-500 transition-colors text-sm"
                            >
                              <Plus className="w-4 h-4 inline mr-1.5" />
                              Add Source
                            </button>
                          </div>
                        </div>

                        {/* Mediums */}
                        <div>
                          <h3 className="text-xs font-semibold text-stone-500 uppercase tracking-wide mb-3">Mediums (types)</h3>
                          <div className="space-y-2">
                            {settings.mediums.map((medium, index) => (
                              <div key={index} className="flex gap-2">
                                <input
                                  type="text"
                                  value={medium}
                                  onChange={(e) => {
                                    const newMediums = [...settings.mediums];
                                    newMediums[index] = e.target.value;
                                    setSettings(prev => ({ ...prev, mediums: newMediums }));
                                  }}
                                  className="flex-1 p-2 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500"
                                />
                                <button
                                  onClick={() => {
                                    const newMediums = settings.mediums.filter((_, i) => i !== index);
                                    setSettings(prev => ({ ...prev, mediums: newMediums }));
                                  }}
                                  className="p-2 text-stone-400 hover:text-red-500 transition-colors"
                                >
                                  <Trash2 className="w-4 h-4" />
                                </button>
                              </div>
                            ))}
                            <button
                              onClick={() => setSettings(prev => ({ ...prev, mediums: [...prev.mediums, ''] }))}
                              className="w-full p-2 border-2 border-dashed border-stone-200 rounded-lg text-stone-400 hover:border-orange-400 hover:text-orange-500 transition-colors text-sm"
                            >
                              <Plus className="w-4 h-4 inline mr-1.5" />
                              Add Medium
                            </button>
                          </div>
                        </div>

                        {/* Campaigns */}
                        <div>
                          <h3 className="text-xs font-semibold text-stone-500 uppercase tracking-wide mb-3">Campaigns</h3>
                          <div className="space-y-2">
                            {settings.campaigns.map((campaignOption, index) => (
                              <div key={index} className="flex gap-2">
                                <input
                                  type="text"
                                  value={campaignOption}
                                  onChange={(e) => {
                                    const newCampaigns = [...settings.campaigns];
                                    newCampaigns[index] = e.target.value;
                                    setSettings(prev => ({ ...prev, campaigns: newCampaigns }));
                                  }}
                                  className="flex-1 p-2 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500"
                                />
                                <button
                                  onClick={() => {
                                    const newCampaigns = settings.campaigns.filter((_, i) => i !== index);
                                    setSettings(prev => ({ ...prev, campaigns: newCampaigns }));
                                  }}
                                  className="p-2 text-stone-400 hover:text-red-500 transition-colors"
                                >
                                  <Trash2 className="w-4 h-4" />
                                </button>
                              </div>
                            ))}
                            <button
                              onClick={() => setSettings(prev => ({ ...prev, campaigns: [...prev.campaigns, ''] }))}
                              className="w-full p-2 border-2 border-dashed border-stone-200 rounded-lg text-stone-400 hover:border-orange-400 hover:text-orange-500 transition-colors text-sm"
                            >
                              <Plus className="w-4 h-4 inline mr-1.5" />
                              Add Campaign
                            </button>
                          </div>
                        </div>
                      </div>

                      </div>{/* end scrollable content */}
                      <div className="flex justify-end gap-3 px-6 py-4 border-t border-stone-100 flex-shrink-0">
                        <button
                          onClick={() => { setShowSettings(false); setSettingsError(null); }}
                          className="px-6 py-2.5 text-stone-500 hover:text-stone-700 font-medium text-sm transition-colors"
                        >
                          Cancel
                        </button>
                        <button
                          disabled={isSavingSettings}
                          onClick={async () => {
                            setIsSavingSettings(true);
                            setSettingsError(null);
                            try {
                              await saveSettings(settings);
                              setShowSettings(false);
                              setLastSaved(new Date());
                              showToast('Settings saved successfully!', 'success');
                            } catch (error) {
                              setSettingsError(error.message || 'Please try again.');
                              showToast('Failed to save settings.', 'error');
                            } finally {
                              setIsSavingSettings(false);
                            }
                          }}
                          className="px-8 py-2.5 bg-orange-500 hover:bg-orange-600 disabled:bg-orange-300 text-white rounded-full font-medium text-sm transition-colors shadow-sm"
                        >
                          {isSavingSettings ? 'Saving...' : 'Save Settings'}
                        </button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        ReactDOM.render(<UTMBuilder />, document.getElementById('root'));
    </script>
</body>
</html>
